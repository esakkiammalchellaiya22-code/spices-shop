<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background-color:#f5f6fa;
        }

        .cart-container{
            max-width:900px;
            margin:40px auto;
        }

        .cart-item{
            background:white;
            border-radius:15px;
            padding:20px;
            margin-bottom:20px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .product-name{
            font-weight:600;
            font-size:22px;
        }

        .price{
            color:#198754;
            font-size:18px;
            font-weight:bold;
        }

        .summary-card{
            background:white;
            border-radius:15px;
            padding:25px;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        .checkout-btn{
            width:100%;
            padding:12px;
            font-size:18px;
            border-radius:10px;
        }

        .remove-btn{
            border-radius:8px;
        }

        .cart-title{
            font-weight:700;
            margin-bottom:25px;
        }
    </style>
</head>
<body>

<div class="container cart-container">

    <h1 class="text-center cart-title">
        🛒 Your Shopping Cart
    </h1>

    {% if cart_items %}

        {% for item in cart_items %}

        <div class="cart-item">

            <div class="row align-items-center">

                <div class="col-md-8">

                    <div class="product-name">
                        {{ item.product.name }}
                    </div>

                    <div class="price mt-2">
                        ₹{{ item.product.price }}
                    </div>

                    <p class="mt-2 mb-0">
                        Quantity: <strong>{{ item.quantity }}</strong>
                    </p>

                </div>

                <div class="col-md-4 text-md-end mt-3 mt-md-0">

                    <a href="/cart/remove/{{ item.id }}">
                        <button class="btn btn-danger remove-btn">
                            Remove
                        </button>
                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

        <div class="summary-card">

            <h3>Order Summary</h3>
            <hr>

            <h4 class="text-success">
                Total Amount: ₹{{ total }}
            </h4>

            <a href="/orders/checkout/">
                <button class="btn btn-success checkout-btn mt-3">
                    Proceed to Checkout
                </button>
            </a>

        </div>

    {% else %}

        <div class="card p-5 text-center shadow">

            <h2>🛍️ Your Cart is Empty</h2>

            <p class="text-muted">
                Add some products to continue shopping.
            </p>

            <a href="/">
                <button class="btn btn-primary">
                    Continue Shopping
                </button>
            </a>

        </div>

    {% endif %}

</div>

</body>
</html>
