<!DOCTYPE html>
<html>
<head>
    <title>Login - Spices Store</title>
</head>
<body style="
margin:0;
font-family:Arial, sans-serif;
background:#f4f7f4;
">

<div style="
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
font-size:24px;
font-weight:bold;
">
🌿 Online Spices Shopping App
</div>

<div style="
display:flex;
justify-content:center;
align-items:center;
height:80vh;
">

<div style="
background:white;
padding:40px;
width:350px;
border-radius:15px;
box-shadow:0px 0px 20px rgba(0,0,0,0.2);
text-align:center;
">

<h2 style="color:#2e7d32;">
Welcome Back
</h2>

<p style="color:gray;">
Login to continue shopping
</p>

<form method="POST">
{% csrf_token %}

<input
type="text"
name="username"
placeholder="Enter Username"
required
style="
width:90%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
">

<input
type="password"
name="password"
placeholder="Enter Password"
required
style="
width:90%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
">

<button
type="submit"
style="
width:100%;
padding:12px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
">
Login
</button>

</form>

<br>

<p>
Don't have an account?
<a href="/accounts/signup/" style="
color:#2e7d32;
font-weight:bold;
text-decoration:none;
">
Create Account
</a>
</p>

</div>

</div>

</body>
</html>
