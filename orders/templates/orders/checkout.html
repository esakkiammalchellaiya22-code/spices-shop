<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background: #f5f7fa;
        }

        .checkout-card{
            max-width: 700px;
            margin: 50px auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .total-box{
            background: #198754;
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        textarea{
            resize: none;
        }

        .btn-order{
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card checkout-card">
        <div class="card-body p-4">

            <h2 class="text-center mb-4">
                🛒 Checkout
            </h2>

            <div class="total-box mb-4">
                Total Amount: ₹{{ total }}
            </div>

            <form method="POST">
    {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-bold">
                        Delivery Address
                    </label>

                    <textarea
                        class="form-control"
                        name="address"
                        rows="5"
                        placeholder="Enter your complete delivery address..."
                        required></textarea>
                </div>

                <button
                    type="submit"
                    class="btn btn-success btn-order">
                    Proceed To Payment
                </button>

            </form>

        </div>
    </div>

</div>

</body>
</html>
