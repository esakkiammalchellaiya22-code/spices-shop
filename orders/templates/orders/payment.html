<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Gateway</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
        }

        .payment-card{
            max-width:600px;
            margin:60px auto;
            border:none;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .payment-header{
            background:#198754;
            color:white;
            text-align:center;
            padding:20px;
        }

        .amount-box{
            background:#f8f9fa;
            border-radius:12px;
            padding:20px;
            text-align:center;
            margin-bottom:20px;
        }

        .amount{
            font-size:32px;
            font-weight:bold;
            color:#198754;
        }

        .payment-option{
            border:1px solid #ddd;
            border-radius:12px;
            padding:15px;
            margin-bottom:10px;
            cursor:pointer;
            transition:0.3s;
        }

        .payment-option:hover{
            background:#f8f9fa;
            border-color:#198754;
        }

        .btn-pay{
            width:100%;
            padding:12px;
            font-size:18px;
            border-radius:12px;
        }

    </style>

</head>
<body>

<div class="container">

    <div class="card payment-card">

        <div class="payment-header">
            <h2>💳 Secure Payment</h2>
            <p class="mb-0">Online Spices Shopping App</p>
        </div>

        <div class="card-body p-4">

            <div class="amount-box">
                <h5>Total Amount</h5>
                <div class="amount">
                    ₹{{ total }}
                </div>
            </div>

            <h5 class="mb-3">
                Select Payment Method
            </h5>

            <div class="payment-option">
                <input type="radio" name="payment" checked>
                UPI Payment
            </div>

            <div class="payment-option">
                <input type="radio" name="payment">
                Google Pay
            </div>

            <div class="payment-option">
                <input type="radio" name="payment">
                PhonePe
            </div>

            <div class="payment-option">
                <input type="radio" name="payment">
                Cash On Delivery
            </div>

            <br>

            <form method="POST">
    {% csrf_token %}

    <button type="submit" class="btn btn-success btn-pay">
        Pay Now
    </button>
</form>
        </div>

    </div>

</div>

</body>
</html>
