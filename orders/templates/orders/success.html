<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Successful</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fa;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }

        .success-card{
            background:white;
            padding:40px;
            border-radius:20px;
            text-align:center;
            max-width:500px;
            width:90%;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        .success-icon{
            font-size:80px;
            margin-bottom:20px;
        }

        .success-title{
            color:#198754;
            font-weight:700;
            margin-bottom:15px;
        }

        .success-text{
            color:#6c757d;
            margin-bottom:25px;
        }

        .btn-shop{
            padding:12px 25px;
            font-size:18px;
            border-radius:10px;
        }
    </style>
</head>
<body>

<div class="success-card">

    <div class="success-icon">
        ✅
    </div>

    <h1 class="success-title">
        Order Placed Successfully!
    </h1>

    <p class="success-text">
        Thank you for your purchase. Your order has been received and is being processed.
    </p>

    <a href="/">
        <button class="btn btn-success btn-shop">
            Continue Shopping
        </button>
    </a>

</div>

</body>
</html>
